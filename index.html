<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CRUDS</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/normalize.css">
    </head>
    <body>
        <div class="cruds">
            <div class="intro-text">
                <h1>CRUDS</h1>
                <p>Create Read Update Delete Search</p>
            </div>
            <div class="inputs">
                <input type="text" id="title" placeholder="title" name="title">
                <div class="price">
                    <input type="number" id="price" placeholder="price" name="price">
                    <input type="number" id="taxes" placeholder="taxes" name="taxes">
                    <input type="number" id="ads" placeholder="ads" name="ads">
                    <input type="number" id="discount" placeholder="discount" name="discount">
                    <span class="total"></span>
                </div>
                <input type="number" id="count" placeholder="count" name="count">
                <input type="text" id="category" placeholder="category" name="category">
                <button id="submit">Create</button>
                <input type="text" id="search" name="search" placeholder="search">
                <div class="search-btns">
                    <button>Search By Title</button>
                    <button>Search By Category</button>
                </div>
                <button id="delete-all" onclick="deleteAll()"></button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>price</th>
                        <th>taxes</th>
                        <th>ads</th>
                        <th>discount</th>
                        <th>total</th>
                        <th>category</th>
                        <th>update</th>
                        <th>delete</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>

        <script src="script.js"></script>
    </body>
</html>
